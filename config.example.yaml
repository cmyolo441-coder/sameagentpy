# Example configuration for termianlagent.
# Copy to config.yaml and edit. Environment variables override these values.

provider: openai          # openai | anthropic | ollama
model: ""                  # empty = provider default
temperature: 0.7
enable_tools: true
theme: midnight           # midnight | solarized | dracula | mono
max_history_messages: 40

# Optional per-provider tuning
providers:
  openai:
    model: gpt-4o
  anthropic:
    model: claude-3-5-sonnet-latest
  ollama:
    base_url: http://localhost:11434
